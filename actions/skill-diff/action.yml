name: "ContextLedger Skill Diff"
description: "Runs semantic diff on changed skill profiles in PRs"

inputs:
  changed-profiles:
    description: "Comma-separated list of profile paths, or 'auto' to detect from PR diff"
    required: false
    default: "auto"
  post-comment:
    description: "Whether to post diff results as a PR comment"
    required: false
    default: "true"
  anthropic-api-key:
    description: "Anthropic API key for LLM-assisted semantic diff (optional)"
    required: false

runs:
  using: "composite"
  steps:
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install contextledger
      shell: bash
      run: pip install contextledger

    - name: Run skill diff
      shell: bash
      env:
        INPUT_CHANGED_PROFILES: ${{ inputs.changed-profiles }}
        INPUT_POST_COMMENT: ${{ inputs.post-comment }}
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        GH_TOKEN: ${{ github.token }}
      run: bash ${{ github.action_path }}/entrypoint.sh
